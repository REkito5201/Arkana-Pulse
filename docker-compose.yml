# Compose V2: атрибут version устарел, не указываем.
# Сети: front (nginx + api), back (api + redis, internal) — Redis недоступен снаружи.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - back

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - front
      - back

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - front

networks:
  front:
    driver: bridge
  back:
    driver: bridge
    internal: true
