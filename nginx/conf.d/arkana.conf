# ---------------------------------------------------------------------------
# Arkana Pulse: reverse proxy на FastAPI (api:8000).
# DevSecOps: заголовки безопасности, проксирование, лимит запросов.
# ---------------------------------------------------------------------------

upstream arkana_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Корень и статика — всё проксируем в приложение (FastAPI отдаёт / и /static).
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://arkana_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Заголовки безопасности (OWASP-ориентированные).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Health-check для оркестраторов (опционально).
    location /healthz {
        access_log off;
        proxy_pass http://arkana_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
