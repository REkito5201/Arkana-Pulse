# ---------------------------------------------------------------------------
# Nginx: главный конфиг (main context).
# Лучшая практика: минимум в main, вся логика виртуальных хостов — в conf.d.
# ---------------------------------------------------------------------------

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Текстовый формат (по умолчанию).
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    # JSON для парсинга в ELK/Loki/Grafana (включите access_log ... json в server).
    log_format json escape=json '{ "time": "$time_iso8601", "remote_addr": "$remote_addr", '
                    '"method": "$request_method", "uri": "$request_uri", "status": $status, '
                    '"body_bytes_sent": $body_bytes_sent, "request_time": $request_time, '
                    '"http_referer": "$http_referer", "http_user_agent": "$http_user_agent" }';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Скрываем версию Nginx в заголовках ответа — меньше информации для атакующего.
    server_tokens off;

    # Ограничение размера тела запроса. Защита от огромных POST/PUT.
    client_max_body_size 1m;

    # Rate limit: зона на 10M ключей (IP), лимит 30 req/s на IP.
    # Дополняет прикладной rate limit в FastAPI (defense in depth).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Подключаем конфиги виртуальных хостов.
    include /etc/nginx/conf.d/*.conf;
}
